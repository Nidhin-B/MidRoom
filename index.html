<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="ambient-canvas"></canvas>
    
    <header class="room-header">
        <button id="menu-toggle">☰</button>
        <span class="room-title">PRIVATE ROOM</span>
        <div style="width: 40px;"></div> <!-- Spacer for balance -->
    </header>

    <main>
        <textarea id="text-input" placeholder="Start writing..."></textarea>
    </main>

    <footer class="room-footer">
        <div class="footer-actions">
            <button id="save-btn">Save</button>
            <button id="copy-btn">Copy</button>
            <button id="download-btn">Download</button>
        </div>
    </footer>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>CHAMBER</h2>
            <button id="close-sidebar">&times;</button>
        </div>
        <button id="new-canvas-btn">New Canvas</button>
        <div class="sidebar-section">
            <h3>DRAFTS</h3>
            <ul id="drafts-list"></ul>
        </div>
        <div class="sidebar-section">
            <h3>AUDIO</h3>
            <input type="range" id="master-volume" min="0" max="100" value="100">
            <div class="sound-grid">
                <button class="sound-btn" data-sound="lofi">LoFi</button>
                <button class="sound-btn" data-sound="rain">Rain</button>
                <button class="sound-btn" data-sound="void">Void</button>
                <button class="sound-btn" data-sound="keyboard">Keys</button>
            </div>
        </div>
    </div>

    <div id="toast-notification"></div>
    <script src="script.js"></script>
</body>
</html>
