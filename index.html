<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MidRoom — Atmospheric Vault</title>
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

    <canvas id="ambient-canvas"></canvas>

    <div class="canvas-container">
        
        <header class="top-nav">
            <div class="nav-controls">
                <button class="nav-btn" id="menu-toggle">Menu</button>
                <button class="nav-btn" id="new-canvas-btn">+</button>
            </div>
            <div class="status-indicator" id="status-indicator">Private Room</div>
        </header>

        <textarea id="text-input" placeholder="Type your thoughts into the void..." spellcheck="false"></textarea>

        <footer class="toolbar">
            <div class="stats">
                <span id="word-count">0</span> words
            </div>
            <div class="actions">
                <button class="action-btn" id="save-btn">Save Draft</button>
                <button class="action-btn" id="copy-btn">Copy Text</button>
                <button class="action-btn" id="download-btn">Download .txt</button>
            </div>
        </footer>

    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>THE VAULT</h3>
            <button class="icon-btn" id="close-sidebar">&times;</button>
        </div>
        <ul class="drafts-list" id="drafts-list"></ul>
    </aside>

    <div id="toast-notification" class="toast-container"></div>

    <script src="script.js?v=10"></script>
</body>
</html>
