<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chamber</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <div class="logo">// CH-09</div>
            <button id="open-settings-btn" class="nav-btn">Chamber Settings</button>
        </header>

        <section class="writing-area">
            <textarea placeholder="Begin your transmission here..."></textarea>
        </section>

        <footer class="app-footer">
            <div id="now-playing-track">// listening to: silence</div>
            <div class="system-status">SYS_STATUS: READY</div>
        </footer>
    </main>

    <div id="settings-modal" class="settings-modal">
        <div class="settings-content">
            <div class="modal-header">
                <h2>Chamber Settings</h2>
                <button id="close-settings-btn" class="close-btn">&times;</button>
            </div>
            
            <hr class="divider">

            <div class="settings-section">
                <label for="master-volume">Master Output</label>
                <div class="volume-container">
                    <input type="range" id="master-volume" min="0" max="100" value="50">
                </div>
            </div>

            <div class="settings-section">
                <label>Ambient Tuning</label>
                <div class="audio-playlist-wrapper">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://w.soundcloud.com/player/api.js"></script>

    <iframe id="ghost-sc-player" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1" scrolling="no" frameborder="no" allow="autoplay"></iframe>

    <script src="script.js"></script>
</body>
</html>
