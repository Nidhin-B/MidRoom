<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MidRoom — Ambient Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Ambient Jungle Particle Canvas Layer -->
    <canvas id="ambient-canvas"></canvas>

    <!-- Main Interactive Writing Void Container -->
    <div class="canvas-container">
        
        <!-- Top Navigation Header -->
        <header class="top-nav">
            <button class="nav-btn" id="menu-toggle">Menu</button>
            <div class="status-indicator">Private Room</div>
        </header>

        <!-- Main Central Text Input Field -->
        <textarea id="text-input" placeholder="Type your thoughts into the void..." spellcheck="false"></textarea>

        <!-- Fixed Universal Bottom Toolbar Layout -->
        <footer class="toolbar">
            <div class="stats">
                <span id="word-count">0</span> words
            </div>
            <div class="actions">
                <button class="action-btn" id="save-btn">Save Draft</button>
                <button class="action-btn" id="copy-btn">Copy Text</button>
                <button class="action-btn" id="download-btn">Download .txt</button>
            </div>
        </footer>

    </div>

    <!-- The Enchanted Vault Sidebar System -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>DRAFTS VAULT</h3>
            <button class="icon-btn" id="close-sidebar">&times;</button>
        </div>
        <ul class="drafts-list" id="drafts-list">
            <!-- JavaScript dynamically injects list items here -->
        </ul>
    </aside>

    <script src="script.js"></script>
</body>
</html>
