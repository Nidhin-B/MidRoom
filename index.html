<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Midroom — Ambient Writing Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="ambient-canvas"></canvas>

    <main class="canvas-container">
        
        <nav class="top-nav">
            <div class="nav-controls">
                <button class="nav-btn" id="menu-toggle">Menu</button>
                <button class="nav-btn" id="new-canvas-btn" title="Open Clean Canvas">+</button>
            </div>
            <span class="status-indicator" id="status-indicator">Private Room</span>
        </nav>

        <textarea id="text-input" placeholder="Type your thoughts into the void..." autofocus spellcheck="false"></textarea>

        <footer class="toolbar">
            <div class="stats">
                <span id="word-count">0</span> words
            </div>
            <div class="actions">
                <button class="action-btn" id="save-btn">Save Draft</button>
                <button class="action-btn" id="copy-btn">Copy Text</button>
                <button class="action-btn" id="download-btn">Download .txt</button>
            </div>
        </footer>

    </main>

    <div class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <h3>THE VAULT</h3>
            <button class="icon-btn" id="close-sidebar">&times;</button>
        </header>
        <ul class="drafts-list" id="drafts-list"></ul>
        
        <div class="sidebar-footer">
            <button class="nav-btn" id="settings-toggle">Chamber Settings</button>
        </div>
    </div>

    <div class="settings-modal" id="settings-modal">
        <div class="settings-content">
            <header class="settings-header">
                <h3>CHAMBER SETTINGS</h3>
                <button class="icon-btn" id="close-settings">&times;</button>
            </header>

            <div class="settings-section">
                <h4>Ambient Audio Suite</h4>
                <div class="control-group">
                    <div class="label-row">
                        <label>Master Volume</label>
                        <span id="volume-val">50%</span>
                    </div>
                    <input type="range" class="volume-slider" id="master-volume" min="0" max="100" value="50">
                </div>
                
                <div class="audio-playlist-wrapper">
                    <div class="audio-playlist">
                        <div class="audio-track" data-sound="lofi">
                            <div class="track-meta">
                                <span class="card-status"></span>
                                <span class="card-name">LoFi Beats</span>
                            </div>
                            <span class="track-index">Void-01</span>
                        </div>
                        <div class="audio-track" data-sound="rain">
                            <div class="track-meta">
                                <span class="card-status"></span>
                                <span class="card-name">Rain on Canopy</span>
                            </div>
                            <span class="track-index">Void-02</span>
                        </div>
                        <div class="audio-track" data-sound="void">
                            <div class="track-meta">
                                <span class="card-status"></span>
                                <span class="card-name">Deep Void Hum</span>
                            </div>
                            <span class="track-index">Void-03</span>
                        </div>
                        <div class="audio-track" data-sound="keyboard">
                            <div class="track-meta">
                                <span class="card-status"></span>
                                <span class="card-name">Mechanical SFX</span>
                            </div>
                            <span class="track-index">Keys-01</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h4>Aesthetic Tuning</h4>
                <div class="control-group">
                    <label>Text Scaling</label>
                    <div class="toggle-group">
                        <button class="scale-btn" data-size="small">Small</button>
                        <button class="scale-btn active" data-size="medium">Medium</button>
                        <button class="scale-btn" data-size="large">Large</button>
                    </div>
                </div>
                <div class="control-group split-row">
                    <label for="particle-switch">Spore Particle Engine</label>
                    <label class="switch-container">
                        <input type="checkbox" id="particle-switch" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-notification">Notification</div>

    <script src="script.js"></script>
</body>
</html>
